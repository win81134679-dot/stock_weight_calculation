<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="64" fill="#2563EB"/>
  <!-- 計算機外框 -->
  <rect x="128" y="64" width="256" height="384" rx="32" stroke="#FFFFFF" stroke-width="16" fill="none"/>
  <!-- 螢幕 -->
  <rect x="160" y="100" width="192" height="80" rx="12" fill="#FFFFFF" opacity="0.2"/>
  <!-- $ 符號 -->
  <text x="332" y="160" font-family="monospace" font-size="40" font-weight="bold" fill="#FFFFFF" text-anchor="end">$</text>
  <!-- 按鍵 3x3 -->
  <rect x="168" y="212" width="48" height="48" rx="10" stroke="#FFFFFF" stroke-width="6" fill="none"/>
  <rect x="232" y="212" width="48" height="48" rx="10" stroke="#FFFFFF" stroke-width="6" fill="none"/>
  <rect x="296" y="212" width="48" height="48" rx="10" stroke="#FFFFFF" stroke-width="6" fill="none"/>
  <rect x="168" y="276" width="48" height="48" rx="10" stroke="#FFFFFF" stroke-width="6" fill="none"/>
  <rect x="232" y="276" width="48" height="48" rx="10" stroke="#FFFFFF" stroke-width="6" fill="none"/>
  <rect x="296" y="276" width="48" height="48" rx="10" stroke="#FFFFFF" stroke-width="6" fill="none"/>
  <rect x="168" y="340" width="48" height="48" rx="10" stroke="#FFFFFF" stroke-width="6" fill="none"/>
  <rect x="232" y="340" width="48" height="48" rx="10" stroke="#FFFFFF" stroke-width="6" fill="none"/>
  <!-- = 按鍵（白色填充） -->
  <rect x="296" y="340" width="48" height="48" rx="10" fill="#FFFFFF"/>
  <text x="320" y="372" font-family="sans-serif" font-size="24" font-weight="bold" fill="#2563EB" text-anchor="middle">=</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="0" fill="#FFFFFF"/>
  <!-- 計算機外框 -->
  <rect x="128" y="64" width="256" height="384" rx="32" stroke="#1A1A2E" stroke-width="20" fill="none"/>
  <!-- 螢幕 -->
  <rect x="160" y="100" width="192" height="80" rx="12" fill="#1A1A2E" opacity="0.08"/>
  <!-- 螢幕數字裝飾 -->
  <text x="332" y="160" font-family="monospace" font-size="40" font-weight="bold" fill="#1A1A2E" text-anchor="end">$</text>
  <!-- 按鍵 4x3 grid -->
  <!-- Row 1 -->
  <rect x="168" y="212" width="48" height="48" rx="10" stroke="#1A1A2E" stroke-width="8" fill="none"/>
  <rect x="232" y="212" width="48" height="48" rx="10" stroke="#1A1A2E" stroke-width="8" fill="none"/>
  <rect x="296" y="212" width="48" height="48" rx="10" stroke="#1A1A2E" stroke-width="8" fill="none"/>
  <!-- Row 2 -->
  <rect x="168" y="276" width="48" height="48" rx="10" stroke="#1A1A2E" stroke-width="8" fill="none"/>
  <rect x="232" y="276" width="48" height="48" rx="10" stroke="#1A1A2E" stroke-width="8" fill="none"/>
  <rect x="296" y="276" width="48" height="48" rx="10" stroke="#1A1A2E" stroke-width="8" fill="none"/>
  <!-- Row 3 -->
  <rect x="168" y="340" width="48" height="48" rx="10" stroke="#1A1A2E" stroke-width="8" fill="none"/>
  <rect x="232" y="340" width="48" height="48" rx="10" stroke="#1A1A2E" stroke-width="8" fill="none"/>
  <!-- = 按鍵（強調） -->
  <rect x="296" y="340" width="48" height="48" rx="10" stroke="#1A1A2E" stroke-width="8" fill="#1A1A2E"/>
  <text x="320" y="372" font-family="sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">=</text>
</svg>
